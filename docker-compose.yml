services:
  queue-app:
    build:
      context: .
      platform: linux/arm/v7   # ARM32 (Raspberry Pi 2/3/4 32-bit OS)
    restart: unless-stopped
    ports:
      - "8080:8080"   # HTTP
      - "8443:8443"   # HTTPS (required for PWA Web Push)
    volumes:
      - ./data:/app/data
    environment:
      - VAPID_EMAIL=admin@yourshop.com
