<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Queue Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+Thai:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #ffffff;
      color: #1e293b;
      font-family: 'Inter', 'Noto Sans Thai', 'Segoe UI', Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* Top bar */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      background: #f7fafe;
      border-bottom: 1px solid #e2e8f0;
    }
    #shop-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    #shop-logo {
      height: 52px;
      max-width: 160px;
      object-fit: contain;
      display: none;
    }
    #shop-name {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #1e293b;
    }
    #clock {
      font-size: 1.8rem;
      font-weight: 300;
      color: #64748b;
      font-variant-numeric: tabular-nums;
    }

    /* Main content — serving centered, sidebar pinned right */
    #main {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding-right: 280px; /* reserve space for the absolute sidebar */
    }

    /* Center: NOW SERVING — truly centered on the full page */
    #current-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 1;
    }
    #serving-label {
      display: flex;
      align-items: center;
      gap: 0.5em;
      font-size: clamp(1.6rem, 2.8vw, 3rem);
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #94a3b8;
    }
    .label-sep { opacity: 0.4; }
    #current-number {
      font-size: clamp(12rem, 28vw, 36rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.02em;
      color: #1e293b;
    }
    #current-number.flash {
      animation: flash 0.6s ease;
    }
    @keyframes flash {
      0%   { transform: scale(1);    color: #1e293b; }
      30%  { transform: scale(1.06); color: #0ea5e9; }
      100% { transform: scale(1);    color: #1e293b; }
    }

    /* Right sidebar — pinned to the right edge */
    #sidebar {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 280px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 36px;
      padding: 48px 36px;
      background: #f7fafe;
      border-left: 1px solid #e2e8f0;
    }

    /* Info blocks */
    .info-block {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .info-label {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #94a3b8;
    }
    .info-value {
      font-size: 4.5rem;
      font-weight: 800;
      color: #1e293b;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    #waiting-count { color: #d97706; }

    /* QR code */
    #qr-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      margin-top: 4px;
    }
    #qr-label {
      font-size: 0.7rem;
      color: #94a3b8;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    #qr-container {
      border-radius: 10px;
      background: #fff;
      border: 1px solid #e2e8f0;
      padding: 8px;
      line-height: 0;
    }
    #qr-container img,
    #qr-container canvas {
      border-radius: 4px;
      display: block;
    }

    /* Ticker */
    #ticker-wrap {
      height: 56px;
      background: #2563eb;
      border-top: none;
      overflow: hidden;
      display: flex;
      align-items: center;
    }
    #ticker-inner {
      white-space: nowrap;
      display: inline-block;
      padding-left: 100%;
      animation: scroll 30s linear infinite;
      font-size: 1.2rem;
      color: #fff;
      font-weight: 500;
    }
    #ticker-inner.paused { animation-play-state: paused; }
    @keyframes scroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-100%); }
    }
    #ticker-wrap.hidden { display: none; }

    /* ── Audio unlock banner (iOS autoplay workaround) ──────────────────── */
    #audio-unlock {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(37, 99, 235, 0.92);
      color: #fff;
      padding: 10px 22px;
      border-radius: 99px;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      cursor: pointer;
      z-index: 200;
      backdrop-filter: blur(6px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.18);
      transition: opacity 0.4s, transform 0.4s;
      white-space: nowrap;
    }
    #audio-unlock.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateX(-50%) translateY(12px);
    }

    /* ── Mobile (phone preview) ─────────────────────────────────────────── */
    @media (max-width: 640px) {
      body { overflow-y: auto; }

      #topbar {
        padding: 10px 14px;
      }
      #shop-logo { height: 32px; max-width: 100px; }
      #shop-name { font-size: 1rem; }
      #clock     { font-size: 0.95rem; }

      #main {
        flex-direction: column;
        justify-content: flex-start;
        align-items: stretch;
        overflow: visible;
        padding-right: 0;
      }

      /* Serving number block — full width, centered */
      #current-card {
        padding: 28px 16px 20px;
        align-items: center;
        border-bottom: 1px solid #e2e8f0;
      }
      #serving-label {
        flex-direction: column;
        align-items: center;
        gap: 0.15em;
        font-size: 0.85rem;
        letter-spacing: 0.1em;
      }
      #serving-label .label-sep { display: none; }
      #current-number {
        font-size: clamp(5rem, 38vw, 8rem);
      }

      /* Sidebar — becomes a horizontal row below the number */
      #sidebar {
        position: static;
        width: 100%;
        flex-direction: row;
        justify-content: space-around;
        align-items: flex-start;
        gap: 0;
        padding: 20px 16px;
        border-left: none;
        border-top: none;
        background: #f8fafc;
      }
      .info-value { font-size: 2.8rem; }

      /* QR makes no sense on the viewer's own phone */
      #qr-wrap { display: none; }

      #ticker-wrap { height: 40px; }
      #ticker-inner { font-size: 0.95rem; }
    }

  </style>
</head>
<body>

<div id="topbar">
  <div id="shop-info">
    <img id="shop-logo" src="" alt="" />
    <div id="shop-name">My Queue</div>
  </div>
  <div id="clock">00:00</div>
</div>

<div id="main">
  <!-- Left: big serving number -->
  <div id="current-card">
    <div id="serving-label">
      <span>กำลังให้บริการ</span>
      <span class="label-sep">·</span>
      <span>NOW SERVING</span>
    </div>
    <div id="current-number">—</div>
  </div>

  <!-- Right: sidebar -->
  <div id="sidebar">
    <div class="info-block">
      <div class="info-label">ถัดไป · NEXT</div>
      <div class="info-value" id="next-number">—</div>
    </div>
    <div class="info-block">
      <div class="info-label">รอคิว · WAITING</div>
      <div class="info-value" id="waiting-count">0</div>
    </div>
    <div id="qr-wrap">
      <div id="qr-label">สแกนเพื่อติดตามคิว · Scan to track</div>
      <div id="qr-container"></div>
    </div>
  </div>
</div>

<div id="audio-unlock" class="hidden">🔊 แตะเพื่อเปิดเสียง · Tap to enable sound</div>

<div id="ticker-wrap" class="hidden">
  <span id="ticker-inner"></span>
</div>

<!-- QR code library (MIT) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
  const currentEl  = document.getElementById('current-number');
  const nextEl     = document.getElementById('next-number');
  const waitingEl  = document.getElementById('waiting-count');
  const shopEl     = document.getElementById('shop-name');
  const shopLogoEl = document.getElementById('shop-logo');
  const tickerWrap = document.getElementById('ticker-wrap');
  const tickerEl   = document.getElementById('ticker-inner');
  const clockEl    = document.getElementById('clock');

  function setLogo(url) {
    if (url) {
      shopLogoEl.src = url + '?t=' + Date.now();
      shopLogoEl.style.display = 'block';
    } else {
      shopLogoEl.style.display = 'none';
      shopLogoEl.src = '';
    }
  }

  // ── Clock (server-synced) ─────────────────────────────────────────────────
  let serverDrift = 0;  // ms: server UTC - browser clock at last WS connect
  let tvTzOffset  = 0;  // hours, from settings

  function updateClock() {
    const correctedUtcMs = Date.now() + serverDrift;
    const localMs        = correctedUtcMs + tvTzOffset * 3600 * 1000;
    const d              = new Date(localMs);
    clockEl.textContent  = d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', timeZone: 'UTC' });
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ── QR code ───────────────────────────────────────────────────────────────
  let qrInstance = null;

  function buildQR(baseUrl) {
    const origin = baseUrl.trim().replace(/\/$/, '') || `${location.protocol}//${location.host}`;
    const statusUrl = `${origin}/status`;
    const container = document.getElementById('qr-container');
    container.innerHTML = '';  // clear previous
    qrInstance = new QRCode(container, {
      text: statusUrl,
      width: 160,
      height: 160,
      colorDark: '#1e293b',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M,
    });
  }

  // Initial load — fetch settings
  let soundOutput = 'tv'; // 'tv' | 'both' | 'admin'
  fetch('/api/settings')
    .then(r => r.json())
    .then(s => {
      buildQR(s.base_url || '');
      soundOutput = s.admin_sound || 'tv';
    })
    .catch(() => buildQR(''));

  // ── Audio unlock (iOS autoplay workaround) ───────────────────────────────
  const audioUnlockEl = document.getElementById('audio-unlock');
  let audioUnlocked = false;

  function unlockAudio() {
    if (audioUnlocked) return;
    audioUnlocked = true;
    audioUnlockEl.classList.add('hidden');
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      ctx.resume().then(() => {
        const buf = ctx.createBuffer(1, 1, 22050);
        const src = ctx.createBufferSource();
        src.buffer = buf;
        src.connect(ctx.destination);
        src.start(0);
      });
    } catch (e) {}
  }

  // Test if autoplay is allowed; show banner only if blocked
  (function checkAutoplay() {
    const silent = new Audio('data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=');
    silent.play().then(() => {
      audioUnlocked = true;  // autoplay allowed, banner stays hidden
    }).catch(() => {
      audioUnlockEl.classList.remove('hidden');  // show tap-to-enable banner
    });
  })();

  // Any tap on the page also unlocks (for smart TVs using remote OK button)
  document.addEventListener('click', unlockAudio, { once: true });
  audioUnlockEl.addEventListener('click', unlockAudio);

  // ── Audio queue (sequential playback) ────────────────────────────────────
  let audioQueue = [];
  let audioPlaying = false;

  function playNext() {
    if (audioQueue.length === 0) { audioPlaying = false; return; }
    audioPlaying = true;
    const url = audioQueue.shift();
    const audio = new Audio(url);
    audio.onended = playNext;
    audio.onerror = playNext;
    audio.play().catch(playNext);
  }

  function enqueueAudio(urls) {
    if (soundOutput === 'admin' || !urls || !urls.length) return;
    audioQueue.push(...urls);
    if (!audioPlaying) playNext();
  }

  // ── Ticker ────────────────────────────────────────────────────────────────
  function setTicker(text) {
    if (!text) { tickerWrap.classList.add('hidden'); return; }
    tickerWrap.classList.remove('hidden');
    tickerEl.textContent = '  ·  ' + text + '  ·  ' + text;
  }

  // ── State update ──────────────────────────────────────────────────────────
  function updateDisplay(status) {
    currentEl.textContent = status.current || '—';
    nextEl.textContent    = status.next    || '—';
    waitingEl.textContent = status.waiting ?? '0';
  }

  function flashNumber() {
    currentEl.classList.remove('flash');
    void currentEl.offsetWidth; // reflow
    currentEl.classList.add('flash');
  }

  // ── WebSocket ─────────────────────────────────────────────────────────────
  let ws;
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws`);

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);

      if (msg.event === 'init') {
        updateDisplay(msg.status);
        shopEl.textContent = msg.shop_name || 'My Queue';
        setTicker(msg.announcement_message);
        setLogo(msg.shop_logo || '');
        if (msg.server_utc) {
          serverDrift = Date.parse(msg.server_utc) - Date.now();
        }
        tvTzOffset = parseFloat(msg.timezone ?? '0') || 0;
        return;
      }

      if (msg.event === 'queue_called') {
        currentEl.textContent = msg.current || '—';
        nextEl.textContent    = msg.next    || '—';
        waitingEl.textContent = msg.waiting ?? '0';
        flashNumber();
        enqueueAudio(msg.audio_urls);
        return;
      }

      if (msg.event === 'queue_recalled') {
        flashNumber();
        enqueueAudio(msg.audio_urls);
        return;
      }

      if (msg.event === 'queue_skipped') {
        currentEl.textContent = msg.current || '—';
        waitingEl.textContent = msg.waiting ?? '0';
        if (msg.current) {
          flashNumber();
          enqueueAudio(msg.audio_urls);
        }
        return;
      }

      if (msg.event === 'queue_added') {
        waitingEl.textContent = msg.waiting ?? '0';
        return;
      }

      if (msg.event === 'queue_reset') {
        currentEl.textContent = '—';
        nextEl.textContent    = '—';
        waitingEl.textContent = '0';
        return;
      }

      if (msg.event === 'settings_updated') {
        shopEl.textContent = msg.shop_name || 'My Queue';
        setTicker(msg.announcement_message);
        setLogo(msg.shop_logo || '');
        if (msg.admin_sound !== undefined) soundOutput = msg.admin_sound;
        if (msg.timezone !== undefined) tvTzOffset = parseFloat(msg.timezone) || 0;
        fetch('/api/settings').then(r => r.json()).then(s => buildQR(s.base_url || '')).catch(() => {});
        return;
      }
    };

    ws.onclose = () => setTimeout(connect, 3000);
    ws.onerror = () => ws.close();
  }

  connect();
</script>
</body>
</html>
